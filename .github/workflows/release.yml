name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"      # stable:     v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-*"    # prerelease: v1.2.3-beta.1

jobs:
  build:
    name: ${{ matrix.rust-target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14          # Apple Silicon (arm64)
            rust-target: aarch64-apple-darwin
            ytdlp-asset: yt-dlp_macos

          - platform: macos-13          # Intel (x86_64)
            rust-target: x86_64-apple-darwin
            ytdlp-asset: yt-dlp_macos

          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            ytdlp-asset: yt-dlp.exe

          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            ytdlp-asset: yt-dlp_linux

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # ── Node ────────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Rust ────────────────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      # Caches ~/.cargo/registry, ~/.cargo/git, and src-tauri/target
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.rust-target }}

      # ── System dependencies (Linux only) ────────────────────────────────────
      - name: Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf \
            ffmpeg

      # ── Sidecar binaries ────────────────────────────────────────────────────
      # Cache is keyed by target + month so yt-dlp auto-updates monthly.
      # restore-keys allows using last month's cache on a miss (avoids cold starts).
      - name: Cache month (for sidecar rotation)
        id: cache-ym
        shell: bash
        run: echo "ym=$(date +'%Y-%m')" >> $GITHUB_OUTPUT

      - name: Cache sidecar binaries
        id: cache-sidecars
        uses: actions/cache@v4
        with:
          path: src-tauri/binaries
          key: sidecars-${{ matrix.rust-target }}-${{ steps.cache-ym.outputs.ym }}
          restore-keys: |
            sidecars-${{ matrix.rust-target }}-

      # yt-dlp — Unix
      - name: Download yt-dlp (Unix)
        if: steps.cache-sidecars.outputs.cache-hit != 'true' && runner.os != 'Windows'
        run: |
          curl -fsSL \
            "https://github.com/yt-dlp/yt-dlp/releases/latest/download/${{ matrix.ytdlp-asset }}" \
            -o "src-tauri/binaries/yt-dlp-${{ matrix.rust-target }}"
          chmod +x "src-tauri/binaries/yt-dlp-${{ matrix.rust-target }}"

      # yt-dlp — Windows
      - name: Download yt-dlp (Windows)
        if: steps.cache-sidecars.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" `
            -OutFile "src-tauri\binaries\yt-dlp-${{ matrix.rust-target }}.exe"

      # ffmpeg — macOS (brew; binary already installed on runner after cache warm-up)
      - name: Install ffmpeg (macOS)
        if: steps.cache-sidecars.outputs.cache-hit != 'true' && runner.os == 'macOS'
        run: |
          brew install --quiet ffmpeg
          cp "$(which ffmpeg)" "src-tauri/binaries/ffmpeg-${{ matrix.rust-target }}"

      # ffmpeg — Linux (installed via apt above, just copy the binary)
      - name: Copy ffmpeg (Linux)
        if: steps.cache-sidecars.outputs.cache-hit != 'true' && runner.os == 'Linux'
        run: cp "$(which ffmpeg)" "src-tauri/binaries/ffmpeg-${{ matrix.rust-target }}"

      # ffmpeg — Windows (static build from BtbN)
      - name: Download ffmpeg (Windows)
        if: steps.cache-sidecars.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $exe = Get-ChildItem -Recurse -Filter ffmpeg.exe ffmpeg_tmp | Select-Object -First 1
          Copy-Item $exe.FullName "src-tauri\binaries\ffmpeg-${{ matrix.rust-target }}.exe"
          Remove-Item -Recurse -Force ffmpeg.zip, ffmpeg_tmp

      # ── Frontend ─────────────────────────────────────────────────────────────
      - run: npm ci

      # ── Tauri build + GitHub Release ─────────────────────────────────────────
      # Stable tag (v1.2.3)  → published release
      # Pre tag   (v1.2.3-*) → prerelease
      # releaseDraft: true   → all matrix jobs upload before the release goes live
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "StroyGetter ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: --target ${{ matrix.rust-target }}
